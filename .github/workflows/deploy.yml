name: Deploy to Railway

on:
  push:
    branches:
      - main  # или master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Notify Railway
        run: |
          curl -X POST https://api.railway.app/v1/webhooks/deploy \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"projectId": "${{ secrets.RAILWAY_PROJECT_ID }}", "serviceId": "${{ secrets.RAILWAY_SERVICE_ID }}"}'